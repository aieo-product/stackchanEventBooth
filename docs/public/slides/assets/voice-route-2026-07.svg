<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" font-family="Hiragino Kaku Gothic ProN, Noto Sans JP, Meiryo, sans-serif">
  <!-- #135: スタックちゃん音声応答ルート全体図 (2026-07-14 実機構成) — LT スライド用 16:9 -->
  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#455a64"/>
    </marker>
    <marker id="arG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#2e7d32"/>
    </marker>
    <marker id="arO" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#e65100"/>
    </marker>
  </defs>

  <rect width="1600" height="900" fill="#fafafa"/>
  <text x="800" y="62" text-anchor="middle" font-size="40" font-weight="bold" fill="#263238">スタックちゃん 音声応答ルート — 全部オンデバイス+ローカル即応 (2026-07)</text>
  <text x="800" y="98" text-anchor="middle" font-size="22" fill="#607d8b">聞く=Module-LLM whisper / 考える=Gemma4 司令官が1〜2秒で即応・難問だけ Claude / 話す=Kokoro チャンク合成</text>

  <!-- ==================== 聞く レーン ==================== -->
  <rect x="40" y="130" width="1520" height="200" rx="14" fill="#e3f2fd" stroke="#90caf9" stroke-width="2"/>
  <text x="70" y="168" font-size="26" font-weight="bold" fill="#1565c0">① 聞く</text>

  <rect x="70" y="190" width="200" height="110" rx="10" fill="#fff" stroke="#1565c0" stroke-width="2.5"/>
  <text x="170" y="228" text-anchor="middle" font-size="24" font-weight="bold" fill="#263238">ユーザー</text>
  <text x="170" y="258" text-anchor="middle" font-size="19" fill="#455a64">「ねえドナック、</text>
  <text x="170" y="282" text-anchor="middle" font-size="19" fill="#455a64">今日の天気は？」</text>

  <line x1="270" y1="245" x2="330" y2="245" stroke="#455a64" stroke-width="3" marker-end="url(#ar)"/>

  <rect x="330" y="190" width="250" height="110" rx="10" fill="#fff" stroke="#1565c0" stroke-width="2.5"/>
  <text x="455" y="222" text-anchor="middle" font-size="22" font-weight="bold" fill="#263238">CoreS3 マイク</text>
  <text x="455" y="248" text-anchor="middle" font-size="18" fill="#455a64">ES7210 / 専用タスクで</text>
  <text x="455" y="271" text-anchor="middle" font-size="18" fill="#455a64">20ms毎 UDP ストリーム</text>
  <text x="455" y="293" text-anchor="middle" font-size="15" fill="#c62828">自己発話は実再生フラグでミュート</text>

  <line x1="580" y1="245" x2="640" y2="245" stroke="#455a64" stroke-width="3" marker-end="url(#ar)"/>
  <text x="610" y="232" text-anchor="middle" font-size="15" fill="#607d8b">WiFi</text>

  <rect x="640" y="190" width="290" height="110" rx="10" fill="#fff" stroke="#1565c0" stroke-width="2.5"/>
  <text x="785" y="222" text-anchor="middle" font-size="22" font-weight="bold" fill="#263238">Module-LLM (AX630C)</text>
  <text x="785" y="248" text-anchor="middle" font-size="18" fill="#455a64">注入器 → VAD(0.70) →</text>
  <text x="785" y="271" text-anchor="middle" font-size="18" fill="#455a64">whisper-base (NPU)</text>
  <text x="785" y="293" text-anchor="middle" font-size="16" fill="#c62828">幻聴5層防御で環境音を遮断</text>

  <line x1="930" y1="245" x2="990" y2="245" stroke="#455a64" stroke-width="3" marker-end="url(#ar)"/>
  <text x="960" y="232" text-anchor="middle" font-size="15" fill="#607d8b">UART</text>

  <rect x="990" y="190" width="270" height="110" rx="10" fill="#fff" stroke="#1565c0" stroke-width="2.5"/>
  <text x="1125" y="222" text-anchor="middle" font-size="22" font-weight="bold" fill="#263238">CoreS3 wake判定</text>
  <text x="1125" y="248" text-anchor="middle" font-size="18" fill="#455a64">呼びかけだけなら即</text>
  <text x="1125" y="271" text-anchor="middle" font-size="18" fill="#455a64">「はい、聞いてますよ」</text>
  <text x="1125" y="293" text-anchor="middle" font-size="16" fill="#2e7d32">事前PCM = 合成0ms + 傾聴窓15s</text>

  <line x1="1260" y1="245" x2="1320" y2="245" stroke="#455a64" stroke-width="3" marker-end="url(#ar)"/>

  <rect x="1320" y="190" width="220" height="110" rx="10" fill="#fff" stroke="#1565c0" stroke-width="2.5"/>
  <text x="1430" y="228" text-anchor="middle" font-size="22" font-weight="bold" fill="#263238">Mac Studio</text>
  <text x="1430" y="256" text-anchor="middle" font-size="18" fill="#455a64">bridge (WSS)</text>
  <text x="1430" y="282" text-anchor="middle" font-size="16" fill="#607d8b">Tailscale 経由</text>

  <!-- ==================== 考える レーン ==================== -->
  <rect x="40" y="360" width="1520" height="290" rx="14" fill="#f3e5f5" stroke="#ce93d8" stroke-width="2"/>
  <text x="70" y="398" font-size="26" font-weight="bold" fill="#6a1b9a">② 考える — Gemma4 司令官エンジン (JCARVIS)</text>

  <rect x="70" y="430" width="350" height="180" rx="10" fill="#fff" stroke="#6a1b9a" stroke-width="2.5"/>
  <text x="245" y="465" text-anchor="middle" font-size="21" font-weight="bold" fill="#263238">Gemma4 (E4B) ローカル常駐</text>
  <text x="245" y="494" text-anchor="middle" font-size="18" fill="#455a64">1コールで「難易度分類+生成」</text>
  <rect x="110" y="510" width="270" height="40" rx="6" fill="#ede7f6"/>
  <text x="245" y="537" text-anchor="middle" font-size="17" fill="#4527a0">{"difficulty":"easy|hard","text":…}</text>
  <text x="245" y="585" text-anchor="middle" font-size="20" font-weight="bold" fill="#c62828">ウォーム TTFB 0.3〜1.7秒</text>

  <!-- easy path -->
  <line x1="410" y1="480" x2="530" y2="450" stroke="#2e7d32" stroke-width="4" marker-end="url(#arG)"/>
  <text x="470" y="448" text-anchor="middle" font-size="20" font-weight="bold" fill="#2e7d32">easy</text>
  <rect x="530" y="415" width="430" height="90" rx="10" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2.5"/>
  <text x="745" y="450" text-anchor="middle" font-size="21" font-weight="bold" fill="#1b5e20">そのまま回答 (雑談・一般知識・計算)</text>
  <text x="745" y="482" text-anchor="middle" font-size="17" fill="#2e7d32">Agent SDK 呼ばず = 課金ゼロ / 1〜2秒で発話開始</text>

  <!-- hard path -->
  <line x1="410" y1="560" x2="530" y2="580" stroke="#e65100" stroke-width="4" marker-end="url(#arO)"/>
  <text x="470" y="595" text-anchor="middle" font-size="20" font-weight="bold" fill="#e65100">hard</text>
  <rect x="530" y="535" width="430" height="95" rx="10" fill="#fff3e0" stroke="#e65100" stroke-width="2.5"/>
  <text x="745" y="568" text-anchor="middle" font-size="21" font-weight="bold" fill="#bf360c">フィラー即答 (Donack人格)</text>
  <text x="745" y="598" text-anchor="middle" font-size="19" fill="#e65100">「調べて、分かったら声でお伝えしますね」</text>
  <text x="745" y="622" text-anchor="middle" font-size="16" fill="#8d6e63">予定・メール・天気・多段推論・最新情報</text>

  <line x1="960" y1="580" x2="1050" y2="580" stroke="#e65100" stroke-width="4" marker-end="url(#arO)"/>

  <rect x="1050" y="520" width="490" height="120" rx="10" fill="#fff" stroke="#e65100" stroke-width="2.5"/>
  <text x="1295" y="555" text-anchor="middle" font-size="20" font-weight="bold" fill="#263238">Claude Agent SDK (非同期の正式回答)</text>
  <text x="1295" y="585" text-anchor="middle" font-size="15" fill="#455a64">プライベート情報 (予定/メール/タスク) は JCARVIS 常駐脳で推論</text>
  <text x="1295" y="615" text-anchor="middle" font-size="15" fill="#e65100">完了後 push.js speak → 100字以内の話し言葉で音声プッシュ</text>

  <!-- failsafe note -->
  <text x="245" y="640" text-anchor="middle" font-size="16" fill="#607d8b">Gemma 5sタイムアウト/停止時 → SDK直行 (フェイルセーフ)</text>

  <!-- ==================== 話す レーン ==================== -->
  <rect x="40" y="680" width="1520" height="180" rx="14" fill="#e8f5e9" stroke="#a5d6a7" stroke-width="2"/>
  <text x="70" y="718" font-size="26" font-weight="bold" fill="#2e7d32">③ 話す — 全文を待たない</text>

  <rect x="80" y="740" width="380" height="100" rx="10" fill="#fff" stroke="#2e7d32" stroke-width="2.5"/>
  <text x="270" y="772" text-anchor="middle" font-size="21" font-weight="bold" fill="#263238">CoreS3 文境界チャンク分割</text>
  <text x="270" y="800" text-anchor="middle" font-size="18" fill="#455a64">agent.delta を「。！？」で切って即送出</text>
  <text x="270" y="826" text-anchor="middle" font-size="18" font-weight="bold" fill="#c62828">delta 受信 → 25〜142ms で発話要求</text>

  <line x1="460" y1="790" x2="540" y2="790" stroke="#455a64" stroke-width="3" marker-end="url(#ar)"/>
  <text x="500" y="772" text-anchor="middle" font-size="13" fill="#607d8b">HTTP 40ms</text>

  <rect x="540" y="740" width="430" height="100" rx="10" fill="#fff" stroke="#2e7d32" stroke-width="2.5"/>
  <text x="755" y="772" text-anchor="middle" font-size="19" font-weight="bold" fill="#263238">Module-LLM Kokoro (常駐・オンデバイス)</text>
  <text x="755" y="800" text-anchor="middle" font-size="18" fill="#455a64">FIFOキュー: 前チャンク再生中に次を合成 (重畳)</text>
  <text x="755" y="826" text-anchor="middle" font-size="18" fill="#455a64">フィラー6種+相槌は事前レンダPCM = 0ms</text>

  <line x1="970" y1="790" x2="1050" y2="790" stroke="#455a64" stroke-width="3" marker-end="url(#ar)"/>

  <rect x="1050" y="740" width="200" height="100" rx="10" fill="#fff" stroke="#2e7d32" stroke-width="2.5"/>
  <text x="1150" y="780" text-anchor="middle" font-size="34">🔊</text>
  <text x="1150" y="820" text-anchor="middle" font-size="20" font-weight="bold" fill="#263238">jf_alpha 音声</text>

  <rect x="1290" y="740" width="250" height="100" rx="10" fill="#263238"/>
  <text x="1415" y="775" text-anchor="middle" font-size="19" font-weight="bold" fill="#fff">体感レイテンシ</text>
  <text x="1415" y="803" text-anchor="middle" font-size="18" fill="#a5d6a7">easy: 1〜2秒で本回答</text>
  <text x="1415" y="828" text-anchor="middle" font-size="18" fill="#ffcc80">hard: 1〜2秒でフィラー</text>
</svg>
