<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 760" font-family="'Helvetica Neue',Arial,'Hiragino Sans','Noto Sans JP',sans-serif">
  <defs>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M60 0H0V60" fill="none" stroke="#e3e8ef" stroke-width="1"/>
    </pattern>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="4.5" refY="4.5" orient="auto">
      <path d="M0 0L9 4.5L0 9Z" fill="#64748b"/>
    </marker>
    <marker id="arrowS" markerWidth="9" markerHeight="9" refX="4.5" refY="4.5" orient="auto-start-reverse">
      <path d="M0 0L9 4.5L0 9Z" fill="#64748b"/>
    </marker>
  </defs>

  <!-- title -->
  <text x="360" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">ブースレイアウト（推奨：2.0m × 2.0m）</text>
  <text x="360" y="56" text-anchor="middle" font-size="13" fill="#64748b">上から見た図 ／ 1マス = 0.5m</text>

  <!-- booth area 600x600 px = 2.0m x 2.0m, origin (90,120) -->
  <rect x="90" y="120" width="600" height="600" fill="url(#grid)"/>
  <rect x="90" y="120" width="600" height="600" fill="none" stroke="#1d76db" stroke-width="3"/>

  <!-- width dimension top -->
  <line x1="90" y1="100" x2="690" y2="100" stroke="#64748b" stroke-width="1.4" marker-start="url(#arrowS)" marker-end="url(#arrow)"/>
  <text x="390" y="92" text-anchor="middle" font-size="14" font-weight="600" fill="#334155">2.0 m</text>
  <!-- height dimension left -->
  <line x1="70" y1="120" x2="70" y2="720" stroke="#64748b" stroke-width="1.4" marker-start="url(#arrowS)" marker-end="url(#arrow)"/>
  <text x="70" y="425" text-anchor="middle" font-size="14" font-weight="600" fill="#334155" transform="rotate(-90 70 425)">2.0 m</text>

  <!-- back wall label -->
  <text x="390" y="138" text-anchor="middle" font-size="11" fill="#94a3b8">▲ 背面（壁・パネル側）</text>

  <!-- Display table along back: 1800x600mm => 540 x 180 px, placed near back -->
  <rect x="120" y="150" width="540" height="170" rx="8" fill="#fde68a" stroke="#d97706" stroke-width="2"/>
  <text x="390" y="178" text-anchor="middle" font-size="13" font-weight="700" fill="#7c2d12">展示テーブル　W1800 × D600mm</text>

  <!-- accessory display zone (left part of table) -->
  <rect x="135" y="195" width="300" height="110" rx="6" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5"/>
  <text x="285" y="240" text-anchor="middle" font-size="13" font-weight="700" fill="#854d0e">🎀 着せ替え</text>
  <text x="285" y="260" text-anchor="middle" font-size="13" font-weight="700" fill="#854d0e">アクセサリー展示</text>
  <text x="285" y="283" text-anchor="middle" font-size="10.5" fill="#a16207">耳・帽子・ヘッドホン・ケース 等</text>

  <!-- photo booth zone (right part of table) -->
  <rect x="450" y="195" width="195" height="110" rx="6" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="547" y="235" text-anchor="middle" font-size="13" font-weight="700" fill="#991b1b">📸 撮影ブース</text>
  <text x="547" y="256" text-anchor="middle" font-size="10.5" fill="#b91c1c">ジオラマ背景</text>
  <text x="547" y="272" text-anchor="middle" font-size="10.5" fill="#b91c1c">W900×D450</text>

  <!-- staff position behind table -->
  <circle cx="390" cy="300" r="0" />
  <text x="390" y="345" text-anchor="middle" font-size="11" fill="#475569">― スタッフ立ち位置（テーブル内側）―</text>
  <line x1="180" y1="332" x2="600" y2="332" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="5 5"/>

  <!-- visitor circulation zone (front) -->
  <rect x="120" y="430" width="540" height="250" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="7 5"/>
  <text x="390" y="540" text-anchor="middle" font-size="15" font-weight="700" fill="#1e40af">🚶 来場者の体験・回遊スペース</text>
  <text x="390" y="566" text-anchor="middle" font-size="11.5" fill="#3b82f6">着せ替え → 撮影 → 投稿　の動線（2〜3名同時）</text>

  <!-- front opening label -->
  <text x="390" y="708" text-anchor="middle" font-size="11" fill="#94a3b8">▼ 通路側（来場者の入口）</text>

  <!-- stackchan mini icon on photo booth -->
  <g transform="translate(540,288)">
    <rect x="-9" y="-9" width="18" height="18" rx="3" fill="#fff" stroke="#334155" stroke-width="1.5"/>
    <circle cx="-3.5" cy="-1" r="1.6" fill="#38bdf8"/><circle cx="3.5" cy="-1" r="1.6" fill="#38bdf8"/>
    <path d="M-3.5 4H3.5" stroke="#38bdf8" stroke-width="1.4" stroke-linecap="round"/>
  </g>
</svg>
