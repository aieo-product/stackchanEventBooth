<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 560" font-family="'Helvetica Neue',Arial,'Hiragino Sans','Noto Sans JP',sans-serif">
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="4.5" refY="4.5" orient="auto">
      <path d="M0 0L9 4.5L0 9Z" fill="#64748b"/>
    </marker>
    <marker id="arrowS" markerWidth="9" markerHeight="9" refX="4.5" refY="4.5" orient="auto-start-reverse">
      <path d="M0 0L9 4.5L0 9Z" fill="#64748b"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="760" height="560" fill="#ffffff"/>
  <text x="380" y="36" text-anchor="middle" font-size="21" font-weight="700" fill="#0f172a">卓上レイアウト（テーブル1台で展示＋撮影が完結）</text>
  <text x="380" y="58" text-anchor="middle" font-size="13" fill="#64748b">上から見た図 ／ テーブル W1800 × D600mm（想定・要確認）</text>

  <!-- back side label -->
  <text x="380" y="92" text-anchor="middle" font-size="11.5" fill="#94a3b8">▲ スタッフ側（テーブル内側）</text>

  <!-- table -->
  <rect x="80" y="100" width="600" height="180" rx="10" fill="#fde68a" stroke="#d97706" stroke-width="3"/>

  <!-- width dim -->
  <line x1="80" y1="84" x2="680" y2="84" stroke="#64748b" stroke-width="1.3" marker-start="url(#arrowS)" marker-end="url(#arrow)" opacity="0"/>

  <!-- display zone (left half) -->
  <rect x="100" y="128" width="270" height="130" rx="7" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.6"/>
  <text x="235" y="172" text-anchor="middle" font-size="15" font-weight="700" fill="#854d0e">🎀 着せ替えアクセサリー展示</text>
  <text x="235" y="197" text-anchor="middle" font-size="11.5" fill="#a16207">耳・帽子・ヘッドホン・ケース・</text>
  <text x="235" y="214" text-anchor="middle" font-size="11.5" fill="#a16207">キーホルダー をトレイで陳列</text>
  <text x="235" y="240" text-anchor="middle" font-size="10.5" fill="#ca8a04">約 W900 × D600</text>

  <!-- photo booth zone (right half) -->
  <rect x="390" y="128" width="270" height="130" rx="7" fill="#fee2e2" stroke="#dc2626" stroke-width="1.6"/>
  <text x="525" y="166" text-anchor="middle" font-size="15" font-weight="700" fill="#991b1b">📸 撮影ブース</text>
  <text x="525" y="189" text-anchor="middle" font-size="11.5" fill="#b91c1c">折りたたみジオラマ背景</text>
  <text x="525" y="206" text-anchor="middle" font-size="11.5" fill="#b91c1c">＋ スタックチャン定位置</text>
  <text x="525" y="240" text-anchor="middle" font-size="10.5" fill="#dc2626">卓上 W900 × D450</text>
  <!-- mini stackchan -->
  <g transform="translate(525,150)">
    <rect x="-9" y="-9" width="18" height="18" rx="3" fill="#fff" stroke="#334155" stroke-width="1.5"/>
    <circle cx="-3.5" cy="-1" r="1.6" fill="#38bdf8"/><circle cx="3.5" cy="-1" r="1.6" fill="#38bdf8"/>
    <path d="M-3.5 4H3.5" stroke="#38bdf8" stroke-width="1.4" stroke-linecap="round"/>
  </g>

  <!-- visitor side -->
  <rect x="80" y="330" width="600" height="150" rx="12" fill="#dbeafe" stroke="#2563eb" stroke-width="1.6" stroke-dasharray="7 5"/>
  <text x="380" y="392" text-anchor="middle" font-size="16" font-weight="700" fill="#1e40af">🚶 来場者の体験スペース（通路側・床専有なし）</text>
  <text x="380" y="418" text-anchor="middle" font-size="12" fill="#3b82f6">着せ替え → 撮影 → ハッシュタグ投稿　／　2〜3名同時</text>
  <!-- visitor dots -->
  <g fill="#60a5fa">
    <circle cx="250" cy="450" r="9"/><circle cx="380" cy="450" r="9"/><circle cx="510" cy="450" r="9"/>
  </g>

  <!-- corridor note -->
  <text x="380" y="510" text-anchor="middle" font-size="11.5" fill="#94a3b8">▼ 通路（幅 約4.4m）を他コミュニティと共用</text>

  <!-- depth dim right -->
  <line x1="710" y1="100" x2="710" y2="280" stroke="#64748b" stroke-width="1.3" marker-start="url(#arrowS)" marker-end="url(#arrow)"/>
  <text x="726" y="195" text-anchor="middle" font-size="12" font-weight="600" fill="#334155" transform="rotate(90 726 195)">D600</text>
</svg>
