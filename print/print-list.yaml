# =============================================================================
# スタックチャン イベントブース 印刷リスト（マニフェスト）
# -----------------------------------------------------------------------------
# このファイルが「何を・どのファイルで・何色・何個 印刷するか」の唯一の定義。
# auto_print.py がこれを読み、Bambu Lab X2D へ順番にジョブを送る。
# 実モデルファイル(3mf/STL)は print/files/ に置く（.gitignore 管理外）。
#   - MakerWorld の Print Profile（事前スライス済み .gcode.3mf）推奨＝そのまま印刷可
#   - download.py で不足ファイルの入手先を確認できる
#
# ライセンス略号: BY / BY-SA / BY-NC / BY-NC-SA / CC0 / MW-STD(標準) / MW-EX(限定)
#   「自作（本企画オリジナル）」= 本企画で新規設計するSTL（source: self-designed）
#   NC=非商用のみ(無料展示OK・物販不可) / SA=改変配布は同ライセンス継承
#   MW-STD/MW-EX=個人非商用の印刷可・データ再配布不可
# redistribute: リポジトリへのファイル同梱可否（true=CC0/BY/BY-SA/BY-NC-SA）
# =============================================================================

defaults:
  printer: X2D          # 送信先プリンター（secrets の BAMBU_* を使用）
  plate: 1              # Print Profile 内のプレート番号
  use_ams: true         # AMS を使う場合 true
  wait_between_sec: 30  # ジョブ完了後、次のジョブ開始までの待機（着脱・確認用）

# 印刷ジョブ（上から順に実行）。enabled:false はスキップ。
